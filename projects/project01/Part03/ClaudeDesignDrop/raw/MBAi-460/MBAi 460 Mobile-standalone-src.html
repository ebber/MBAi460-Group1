<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MBAi 460 Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/tokens.css">
  <link rel="stylesheet" href="src/mobile.css?v=2">
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1532629345422-7515f3d16bb6?w=900&q=75&auto=format" data-resource-id="img_sailing"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1560807707-8cc77767d783?w=900&q=75&auto=format" data-resource-id="img_degu"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900&q=75&auto=format" data-resource-id="img_beach"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=900&q=75&auto=format" data-resource-id="img_lake"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=75&auto=format" data-resource-id="img_mountain"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=900&q=75&auto=format" data-resource-id="img_city"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=900&q=75&auto=format" data-resource-id="img_coffee"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1448375240586-882707db888b?w=900&q=75&auto=format" data-resource-id="img_forest"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1495567720989-cebdbdd97913?w=900&q=75&auto=format" data-resource-id="img_sunset"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1455390582262-044cdead277a?w=900&q=75&auto=format" data-resource-id="img_notes1"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=900&q=75&auto=format" data-resource-id="img_notes2"/>
  <meta name="ext-resource-dependency" content="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=900&q=75&auto=format" data-resource-id="img_bridge"/>
  <style>
    body {
      background: #ECEAE0;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(204,120,92,0.06), transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(95,120,140,0.05), transparent 55%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    :root[data-theme="dark"] body {
      background: #15140F;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(225,139,110,0.06), transparent 50%);
    }
    .stage {
      min-height: 100vh;
      padding: 44px 16px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    .stage-head {
      text-align: center;
      max-width: 900px;
      margin: 0 auto 12px;
    }
    .stage-head .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--color-paper-2);
      border: 1px solid var(--color-line);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-ink-2);
      margin-bottom: 14px;
    }
    .stage-head .eyebrow .dot {
      width: 7px; height: 7px; border-radius: 4px; background: var(--color-accent);
    }
    .stage-head h1 {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0 0 10px;
      line-height: 1.05;
    }
    .stage-head p {
      color: var(--color-ink-2);
      font-size: 15px;
      line-height: 1.5;
      max-width: 560px;
      margin: 0 auto;
    }
    .stage-toolbar {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
      margin-top: 18px;
    }
    .stage-toolbar button {
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 999px;
      background: var(--color-paper);
      border: 1px solid var(--color-line);
      color: var(--color-ink-2);
      display: inline-flex; align-items: center; gap: 6px;
      transition: all .15s;
    }
    .stage-toolbar button:hover { border-color: var(--color-line-strong); color: var(--color-ink); }
    .stage-toolbar button.active {
      background: var(--color-ink);
      color: var(--color-paper);
      border-color: var(--color-ink);
    }
    .frames-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, 402px);
      gap: 48px 40px;
      justify-content: center;
      padding: 20px 0 60px;
    }
    .frame-label {
      text-align: center;
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-ink-3);
      font-weight: 500;
    }
    .frame-label strong {
      display: block;
      font-family: var(--font-serif);
      font-size: 15px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: -0.01em;
      color: var(--color-ink);
      margin-bottom: 2px;
    }
    .single-stage {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 20px 0 60px;
    }

    /* mobile style bits shared */
    @keyframes mBlink {
      0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .stage-switch {
      display: inline-flex;
      background: var(--color-paper-2);
      border: 1px solid var(--color-line);
      border-radius: 999px;
      padding: 3px;
      gap: 0;
    }
    .stage-switch button {
      padding: 7px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-ink-2);
    }
    .stage-switch button.active {
      background: var(--color-ink);
      color: var(--color-paper);
    }

    /* ─── Tweaks panel ─── */
    .tweaks-panel {
      position: fixed;
      right: 20px; bottom: 20px;
      width: 300px;
      background: var(--color-paper);
      border: 1px solid var(--color-line-strong);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(28,27,24,0.14), 0 2px 8px rgba(28,27,24,0.08);
      z-index: 200;
      font-family: var(--font-sans);
      overflow: hidden;
    }
    .tweaks-panel .tp-head {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--color-line);
    }
    .tweaks-panel .tp-head .t {
      font-family: var(--font-serif); font-size: 15px; font-weight: 500; flex: 1;
    }
    .tweaks-panel .tp-body { padding: 12px 14px 14px; }
    .tweaks-panel .tp-row { margin-bottom: 14px; }
    .tweaks-panel .tp-row:last-child { margin-bottom: 0; }
    .tweaks-panel .tp-label {
      display: flex; align-items: baseline; justify-content: space-between;
      font-size: 12px; font-weight: 500; color: var(--color-ink);
      margin-bottom: 6px;
    }
    .tweaks-panel .tp-label .val {
      font-family: var(--font-mono); font-size: 11px; color: var(--color-ink-2);
      background: var(--color-paper-2); padding: 1px 6px; border-radius: 4px;
    }
    .tweaks-panel input[type=range] {
      width: 100%; accent-color: var(--color-accent);
    }
    .tweaks-panel .tp-hint {
      font-size: 11px; color: var(--color-ink-3);
      line-height: 1.4; margin-top: 2px;
    }
  </style>

</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
      <rect width="300" height="300" fill="#F0EEE6"/>
      <rect x="105" y="60" width="90" height="180" rx="16" fill="#1C1B18"/>
      <rect x="115" y="80" width="70" height="140" rx="4" fill="#CC785C"/>
      <text x="150" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="38" font-weight="600" fill="#F0EEE6">M</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="src/data.jsx"></script>
  <script>
    // Rewrite MOCK.ASSETS thumbs from remote URLs to inlined blob URLs.
    window.__remapThumbs = function() {
      const R = window.__resources || {};
      const map = {
        "photo-1527431016426-7243a55ce5da": R.img_sailing,
        "photo-1532629345422-7515f3d16bb6": R.img_sailing,
        "photo-1560807707-8cc77767d783":   R.img_degu,
        "photo-1507525428034-b723cf961d3e": R.img_beach,
        "photo-1501785888041-af3ef285b470": R.img_lake,
        "photo-1464822759023-fed622ff2c3b": R.img_mountain,
        "photo-1477959858617-67f85cf4f1df": R.img_city,
        "photo-1509042239860-f550ce710b93": R.img_coffee,
        "photo-1448375240586-882707db888b": R.img_forest,
        "photo-1495567720989-cebdbdd97913": R.img_sunset,
        "photo-1455390582262-044cdead277a": R.img_notes1,
        "photo-1512820790803-83ca734da794": R.img_notes2,
        "photo-1542831371-29b0f74f9713":   R.img_bridge,
      };
      if (!window.MOCK?.ASSETS) return;
      for (const a of window.MOCK.ASSETS) {
        if (typeof a.thumb === "string") {
          for (const key in map) {
            if (map[key] && a.thumb.includes(key)) { a.thumb = map[key]; break; }
          }
        }
      }
    };
  </script>
  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/shell.jsx"></script>
  <script type="text/babel" src="src/ios-frame.jsx"></script>
  <script type="text/babel" src="src/mobile-shell.jsx"></script>
  <script type="text/babel" src="src/mobile-core.jsx"></script>
  <script type="text/babel" src="src/mobile-screens.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState: uS, useEffect: uE, useMemo: uM, useCallback: uC } = React;

    // Single running mobile app — render with no device frame for use inside an IOSDevice
    function MobileApp({ initialRoute = "library", initialAssetId = null, demoMode = false }) {
      const [theme, setTheme] = uS(() => localStorage.getItem("m_theme") || "light");
      const [authed, setAuthed] = uS(true);
      const [authMode, setAuthMode] = uS("login");
      const [assets, setAssets] = uS(() => window.MOCK.ASSETS.slice());
      const [messages, setMessages] = uS(() => window.MOCK.MESSAGES.slice());
      const [route, setRoute] = uS(initialRoute); // library | upload | chat | profile | settings | admin | help | asset
      const [openAssetId, setOpenAssetId] = uS(initialAssetId);
      const [accountOpen, setAccountOpen] = uS(false);
      const [searchOpen, setSearchOpen] = uS(false);
      const [moreOpen, setMoreOpen] = uS(false);

      uE(() => {
        localStorage.setItem("m_theme", theme);
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      const user = window.MOCK.USER;
      const isStaff = user.roles.includes("staff");

      const openAsset = (id) => { setOpenAssetId(id); setRoute("asset"); };
      const closeAsset = () => { setOpenAssetId(null); setRoute("library"); };
      const handleDelete = (id) => { setAssets(xs => xs.filter(a => a.id !== id)); closeAsset(); };
      const handleRename = (id, name) => { setAssets(xs => xs.map(a => a.id === id ? { ...a, name } : a)); };
      const nav = (r) => { setOpenAssetId(null); setRoute(r); };
      const goAdj = (dir) => {
        const idx = assets.findIndex(a => a.id === openAssetId);
        if (idx < 0) return;
        const next = (idx + dir + assets.length) % assets.length;
        setOpenAssetId(assets[next].id);
      };

      const handleNavFromAccount = (r) => {
        if (r === "admin") setRoute("admin");
        else if (r === "settings") setRoute("settings");
        else if (r === "profile") setRoute("profile");
        else if (r === "help") setRoute("help");
      };

      const logout = () => { setAuthed(false); setRoute("library"); };

      if (!authed) {
        return (
          <div className="m-app">
            <window.MAuth mode={authMode} onLogin={() => setAuthed(true)} onSwitchMode={setAuthMode}/>
          </div>
        );
      }

      // which tab is highlighted
      const tabForRoute = (r) => {
        if (r === "library" || r === "asset") return "library";
        if (r === "upload") return "upload";
        if (r === "chat") return "chat";
        if (r === "profile") return "profile";
        return "more";
      };

      const asset = openAssetId ? assets.find(a => a.id === openAssetId) : null;

      // Body renderer
      const body = (() => {
        if (route === "asset" && asset) return <window.MAssetDetail asset={asset} onBack={closeAsset} onDelete={handleDelete} onRename={handleRename} onPrev={() => goAdj(-1)} onNext={() => goAdj(1)}/>;
        if (route === "upload") return <window.MUpload onBack={() => setRoute("library")} onDone={() => setRoute("library")}/>;
        if (route === "chat") return <window.MChat me={user} users={window.MOCK.CHAT_USERS} messages={messages}/>;
        if (route === "profile") return <window.MProfile user={user} assets={assets} onLogout={logout} onNav={(r) => {
          if (r.startsWith("asset:")) { openAsset(parseInt(r.slice(6))); }
          else setRoute(r);
        }}/>;
        if (route === "settings") return <window.MSettings onBack={() => setRoute("profile")} theme={theme} onTheme={setTheme}/>;
        if (route === "admin") return <window.MAdmin onBack={() => setRoute("profile")} users={window.MOCK.USERS_TABLE} assets={assets}/>;
        if (route === "help") return <window.MHelp onBack={() => setRoute("profile")}/>;
        return <window.MLibrary assets={assets} onOpen={openAsset} onUpload={() => setRoute("upload")} onSearch={() => setSearchOpen(true)}/>;
      })();

      // show top bar on library tab; asset/chat/profile/etc supply their own
      const needsTopBar = route === "library";
      const hideTabBar = route === "asset" || route === "upload" || route === "settings" || route === "admin" || route === "help";

      return (
        <div className="m-app" data-theme={theme}>
          {needsTopBar && (
            <window.MTopBar
              title="MBAi 460"
              onSearch={() => setSearchOpen(true)}
              right={(
                <button className="icon-btn" onClick={() => setAccountOpen(true)} aria-label="Account" style={{ width: 32, height: 32, padding: 0 }}>
                  <span style={{ width: 28, height: 28, borderRadius: 14, background: "var(--color-accent)", color: "var(--color-accent-fg)", display: "grid", placeItems: "center", fontSize: 11, fontWeight: 600 }}>
                    {user.givenname[0]}{user.familyname[0]}
                  </span>
                </button>
              )}
            />
          )}

          <div className={"m-body" + (hideTabBar ? " no-tab" : "")} style={{ position: "relative" }}>
            {body}
          </div>

          {!hideTabBar && (
            <window.MTabBar
              tab={tabForRoute(route)}
              onTab={(t) => {
                if (t === "more") setMoreOpen(true);
                else if (t === "upload") setRoute("upload");
                else setRoute(t);
              }}
              isStaff={isStaff}
            />
          )}

          {/* More sheet — Admin / Settings / Help / Theme */}
          <window.MSheet open={moreOpen} onClose={() => setMoreOpen(false)} title="More">
            <div className="m-card" style={{ marginBottom: 10 }}>
              <button className="m-row" style={{ width: "100%", textAlign: "left" }} onClick={() => { setMoreOpen(false); setRoute("settings"); }}>
                <window.Icon name="settings" size={18} style={{ color: "var(--color-ink-3)" }}/> <span className="t">Settings</span><window.Icon name="arrowR" size={14} className="chev"/>
              </button>
              <button className="m-row" style={{ width: "100%", textAlign: "left" }} onClick={() => { setMoreOpen(false); setRoute("help"); }}>
                <window.Icon name="help" size={18} style={{ color: "var(--color-ink-3)" }}/> <span className="t">Help & shortcuts</span><window.Icon name="arrowR" size={14} className="chev"/>
              </button>
            </div>
            {isStaff && (
              <div className="m-card" style={{ marginBottom: 10 }}>
                <button className="m-row" style={{ width: "100%", textAlign: "left" }} onClick={() => { setMoreOpen(false); setRoute("admin"); }}>
                  <window.Icon name="admin" size={18} style={{ color: "var(--color-accent)" }}/> <span className="t">Admin console</span><window.Icon name="arrowR" size={14} className="chev"/>
                </button>
              </div>
            )}
            <div className="m-card">
              <div className="m-row">
                <window.Icon name={theme === "dark" ? "moon" : "sun"} size={18} style={{ color: "var(--color-ink-3)" }}/>
                <span className="t">Theme</span>
                <div className="m-segs">
                  <button className={"m-seg" + (theme === "light" ? " active" : "")} onClick={() => setTheme("light")}>Light</button>
                  <button className={"m-seg" + (theme === "dark" ? " active" : "")} onClick={() => setTheme("dark")}>Dark</button>
                </div>
              </div>
              <button className="m-row" style={{ width: "100%", textAlign: "left", borderBottom: "none", color: "var(--color-error)" }} onClick={() => { setMoreOpen(false); logout(); }}>
                <window.Icon name="logout" size={18}/> <span className="t">Sign out</span>
              </button>
            </div>
          </window.MSheet>

          {/* Account sheet */}
          <window.MAccountSheet open={accountOpen} onClose={() => setAccountOpen(false)} user={user} onNav={handleNavFromAccount} onLogout={logout}/>

          {/* Search cover */}
          <window.MSearchCover open={searchOpen} onClose={() => setSearchOpen(false)} assets={assets} onOpenAsset={openAsset} onNavScreen={setRoute}/>
        </div>
      );
    }

    // ─────────────────── Frame wrappers ───────────────────
    function FramedScene({ initialRoute, initialAssetId, label, sub, theme, width = 402, height = 874 }) {
      const dark = theme === "dark";
      return (
        <div>
          <window.IOSDevice width={width} height={height} dark={dark}>
            <MobileApp initialRoute={initialRoute} initialAssetId={initialAssetId}/>
          </window.IOSDevice>
          <div className="frame-label">
            <strong>{label}</strong>
            {sub}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = uS("gallery"); // gallery | single
      const [theme, setTheme] = uS(() => localStorage.getItem("mob_theme") || "light");
      uE(() => {
        localStorage.setItem("mob_theme", theme);
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      const scenes = [
        { id: "login",    route: "library", label: "Sign in", sub: "Auth", asAuth: true },
        { id: "library",  route: "library", label: "Library", sub: "14 assets · grid view" },
        { id: "upload",   route: "upload",  label: "Upload",  sub: "Camera + Textract" },
        { id: "photo",    route: "asset",   assetId: 1042,    label: "Photo detail",   sub: "Rekognition labels" },
        { id: "doc",      route: "asset",   assetId: 1041,    label: "Document detail", sub: "Textract · 87% conf." },
        { id: "chat",     route: "chat",    label: "Group chat", sub: "Live group thread" },
        { id: "profile",  route: "profile", label: "Profile", sub: "Stats + recent activity" },
        { id: "settings", route: "settings", label: "Settings", sub: "Theme, notifications, security" },
        { id: "admin",    route: "admin",   label: "Admin",   sub: "Staff-only console" },
        { id: "help",     route: "help",    label: "Help",    sub: "Under-the-hood + gestures" },
      ];

      return (
        <div className="stage">
          <div className="stage-head">
            <div className="eyebrow"><span className="dot"/><span>MBAi 460 · Mobile companion</span></div>
            <h1>Mobile, at 1:1 parity with the console.</h1>
            <p>
              Every screen from the desktop product, reworked for touch: bottom tab nav, pull-up sheets,
              fullscreen search, camera-first upload, Rekognition labels and Textract OCR inline.
              All wired to the same mock data as the desktop build.
            </p>
            <div className="stage-toolbar">
              <div className="stage-switch">
                <button className={view === "gallery" ? "active" : ""} onClick={() => setView("gallery")}>
                  <window.Icon name="grid" size={12} style={{ verticalAlign: "-2px", marginRight: 4 }}/>
                  All screens
                </button>
                <button className={view === "single" ? "active" : ""} onClick={() => setView("single")}>
                  <window.Icon name="play" size={12} style={{ verticalAlign: "-2px", marginRight: 4 }}/>
                  Live demo
                </button>
              </div>
              <div className="stage-switch" style={{ marginLeft: 8 }}>
                <button className={theme === "light" ? "active" : ""} onClick={() => setTheme("light")}>
                  <window.Icon name="sun" size={12} style={{ verticalAlign: "-2px", marginRight: 4 }}/>
                  Light
                </button>
                <button className={theme === "dark" ? "active" : ""} onClick={() => setTheme("dark")}>
                  <window.Icon name="moon" size={12} style={{ verticalAlign: "-2px", marginRight: 4 }}/>
                  Dark
                </button>
              </div>
            </div>
          </div>

          {view === "gallery" ? (
            <div className="frames-grid">
              {scenes.map(s => (
                <FramedScene key={s.id} initialRoute={s.route} initialAssetId={s.assetId} label={s.label} sub={s.sub} theme={theme}/>
              ))}
            </div>
          ) : (
            <div className="single-stage">
              <window.IOSDevice width={402} height={874} dark={theme === "dark"}>
                <MobileApp initialRoute="library"/>
              </window.IOSDevice>
              <div className="muted" style={{ fontSize: 12, maxWidth: 320, textAlign: "center" }}>
                Fully navigable — tap around. Library, Upload (center tab), Chat, Profile, More (Admin / Settings / Help), and asset detail.
              </div>
            </div>
          )}
        </div>
      );
    }

    if (window.__remapThumbs) window.__remapThumbs();
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

    // ───────── Tweaks ─────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "safeTop": 64
    }/*EDITMODE-END*/;

    function applyTweaks(t) {
      // Apply --m-safe-top to every .m-app (each framed device has its own).
      const styleId = "__tweaks_inline";
      let s = document.getElementById(styleId);
      if (!s) { s = document.createElement("style"); s.id = styleId; document.head.appendChild(s); }
      s.textContent = `.m-app { --m-safe-top: ${t.safeTop}px; }`;
    }
    applyTweaks(TWEAK_DEFAULTS);

    function TweaksPanel({ initial, onChange }) {
      const [t, setT] = React.useState(initial);
      const set = (k, v) => {
        const next = { ...t, [k]: v };
        setT(next);
        applyTweaks(next);
        onChange(next);
      };
      return (
        <div className="tweaks-panel">
          <div className="tp-head">
            <window.Icon name="settings" size={16} style={{ color: "var(--color-ink-3)" }}/>
            <div className="t">Tweaks</div>
          </div>
          <div className="tp-body">
            <div className="tp-row">
              <div className="tp-label">
                <span>Top safe-area padding</span>
                <span className="val">{t.safeTop}px</span>
              </div>
              <input
                type="range" min="0" max="80" step="1"
                value={t.safeTop}
                onChange={e => set("safeTop", +e.target.value)}
              />
              <div className="tp-hint">
                Pushes the header (logo, search, avatar) below the iOS status bar &amp; dynamic island.
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Register editmode listener, THEN announce availability.
    (function initEditMode() {
      let tweaksRoot = null;
      let active = false;
      let current = { ...TWEAK_DEFAULTS };

      function mount() {
        if (tweaksRoot) return;
        const el = document.createElement("div");
        el.id = "__tweaks_host";
        document.body.appendChild(el);
        tweaksRoot = ReactDOM.createRoot(el);
        tweaksRoot.render(
          <TweaksPanel
            initial={current}
            onChange={(t) => {
              current = t;
              window.parent.postMessage({ type: "__edit_mode_set_keys", edits: t }, "*");
            }}
          />
        );
      }
      function unmount() {
        if (!tweaksRoot) return;
        tweaksRoot.unmount();
        const el = document.getElementById("__tweaks_host");
        if (el) el.remove();
        tweaksRoot = null;
      }

      window.addEventListener("message", (e) => {
        const d = e.data || {};
        if (d.type === "__activate_edit_mode") { active = true; mount(); }
        else if (d.type === "__deactivate_edit_mode") { active = false; unmount(); }
      });

      try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (e) {}
    })();
  </script>
</body>
</html>

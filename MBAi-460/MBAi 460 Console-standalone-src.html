<script>
// Patch IMG lookups so data.jsx picks up inlined blob URLs instead of remote URLs.
// data.jsx declares `const IMG = { ... }` at top-level, so we can't replace it.
// Instead, monkey-patch Object.defineProperty so reads of IMG.<key> resolve to the blob URL.
// Simpler approach: intercept data.jsx execution by shadowing via a getter trick — but cleanest
// is to POST-PROCESS: after data.jsx runs, rewrite MOCK.ASSETS thumbs from URL → blob URL.
window.__remapThumbs = function() {
  const R = window.__resources || {};
  const map = {
    "photo-1527431016426-7243a55ce5da": R.img_sailing,
    "photo-1500930540546-25cd8c9a0b55": R.img_sailing,
    "photo-1560807707-8cc77767d783":   R.img_degu,
    "photo-1507525428034-b723cf961d3e": R.img_beach,
    "photo-1501785888041-af3ef285b470": R.img_lake,
    "photo-1464822759023-fed622ff2c3b": R.img_mountain,
    "photo-1477959858617-67f85cf4f1df": R.img_city,
    "photo-1509042239860-f550ce710b93": R.img_coffee,
    "photo-1448375240586-882707db888b": R.img_forest,
    "photo-1495567720989-cebdbdd97913": R.img_sunset,
    "photo-1455390582262-044cdead277a": R.img_notes1,
    "photo-1512820790803-83ca734da794": R.img_notes2,
    "photo-1542831371-29b0f74f9713":   R.img_bridge,
  };
  if (!window.MOCK?.ASSETS) return;
  for (const a of window.MOCK.ASSETS) {
    if (typeof a.thumb === "string") {
      for (const key in map) {
        if (map[key] && a.thumb.includes(key)) { a.thumb = map[key]; break; }
      }
    }
  }
};
</script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const URL_PARAMS = new URLSearchParams(location.search);
const URL_NOSTORE = URL_PARAMS.get("noStore") === "1";
const URL_ROUTE = URL_PARAMS.get("route");
const URL_ASSET = URL_PARAMS.get("assetId");
const URL_THEME = URL_PARAMS.get("theme");
const URL_AUTHED = URL_PARAMS.get("authed");

function App() {
  const [authed, setAuthed] = useState(() => URL_AUTHED != null ? URL_AUTHED === "1" : localStorage.getItem("mbai_authed") === "1");
  const [route, setRoute] = useState(() => URL_ROUTE || localStorage.getItem("mbai_route") || "/library");
  const [assetId, setAssetId] = useState(() => {
    if (URL_ASSET) return URL_ASSET;
    const r = URL_ROUTE || "";
    const m = r.match(/^\/asset\/(.+)$/);
    return m ? m[1] : null;
  });
  const [cmdK, setCmdK] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(() => {
    let base;
    try {
      const saved = JSON.parse(localStorage.getItem("mbai_tweaks"));
      if (saved) base = saved;
    } catch {}
    if (!base) base = { theme: "light", accent: "#CC785C", density: "comfy", seed: "pooja", empty: false };
    if (URL_THEME) base = { ...base, theme: URL_THEME };
    return base;
  });
  const T = tweaks;

  const [assets, setAssets] = useState(window.MOCK.ASSETS);
  const user = window.MOCK.USER;

  useEffect(() => { if (!URL_NOSTORE) localStorage.setItem("mbai_authed", authed ? "1" : "0"); }, [authed]);
  useEffect(() => { if (!URL_NOSTORE) localStorage.setItem("mbai_route", route); }, [route]);
  useEffect(() => { if (!URL_NOSTORE) localStorage.setItem("mbai_tweaks", JSON.stringify(T)); }, [T]);

  // Apply theme + accent
  useEffect(() => {
    document.documentElement.dataset.theme = T.theme;
    document.documentElement.style.setProperty("--color-accent", T.accent);
    // derive soft + hover
    const hex = T.accent.replace("#","");
    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    document.documentElement.style.setProperty("--color-accent-soft", `rgba(${r},${g},${b},0.12)`);
    document.documentElement.style.setProperty("--color-accent-ring", `rgba(${r},${g},${b},0.32)`);
    document.documentElement.style.setProperty("--color-accent-2", `rgb(${Math.max(0,r-18)},${Math.max(0,g-18)},${Math.max(0,b-18)})`);
  }, [T.theme, T.accent]);

  // Global shortcuts
  useEffect(() => {
    const h = (e) => {
      if (!authed) return;
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmdK(true); }
      if (e.key === "?" && !["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)) { e.preventDefault(); setRoute("/help"); }
      if (e.key === "u" && !["INPUT","TEXTAREA"].includes(document.activeElement?.tagName) && route.startsWith("/library")) { e.preventDefault(); setRoute("/upload"); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [authed, route]);

  const navigate = useCallback((r) => { setRoute(r); setAssetId(null); }, []);
  const openAsset = useCallback((id) => { setAssetId(id); setRoute(`/asset/${id}`); }, []);
  const currentAsset = useMemo(() => assets.find(a => a.id === assetId), [assetId, assets]);

  const onRename = (id, name) => setAssets(as => as.map(a => a.id === id ? { ...a, name } : a));
  const onDelete = (id) => { setAssets(as => as.filter(a => a.id !== id)); navigate("/library"); };

  const goAdjacent = (dir) => {
    const idx = assets.findIndex(a => a.id === assetId);
    const next = assets[(idx + dir + assets.length) % assets.length];
    if (next) openAsset(next.id);
  };

  if (!authed) {
    if (route === "/register") return <window.RegisterScreen onLogin={() => { setAuthed(true); setRoute("/library"); }} onNav={setRoute}/>;
    return <window.LoginScreen onLogin={() => { setAuthed(true); setRoute("/library"); }} onNav={setRoute}/>;
  }

  let main;
  if (route.startsWith("/asset/") && currentAsset) {
    main = <window.AssetDetail asset={currentAsset} onBack={() => navigate("/library")} onDelete={onDelete} onRename={onRename} onNext={() => goAdjacent(1)} onPrev={() => goAdjacent(-1)}/>;
  } else if (route === "/upload") {
    main = <window.UploadScreen onDone={() => navigate("/library")}/>;
  } else if (route === "/chat") {
    main = <window.ChatScreen user={user}/>;
  } else if (route === "/profile") {
    main = <window.ProfileScreen user={user} assets={assets} onNav={setRoute}/>;
  } else if (route === "/profile/settings") {
    main = <window.SettingsScreen user={user} onBack={() => navigate("/profile")}/>;
  } else if (route.startsWith("/admin/users")) {
    main = <window.AdminUsers/>;
  } else if (route.startsWith("/admin/assets")) {
    main = <window.AdminUsers/>;
  } else if (route === "/help") {
    main = <window.HelpScreen/>;
  } else {
    main = <window.Library assets={assets} onOpenAsset={openAsset} onOpenUpload={() => navigate("/upload")} density={T.density} emptyState={T.empty} onOpenCmdK={() => setCmdK(true)}/>;
  }

  return (
    <window.ToastProvider>
      <window.TopBar route={route} onNav={navigate} onOpenCmdK={() => setCmdK(true)} onToggleTweaks={() => setTweaksOpen(x => !x)} user={user} onLogout={() => { setAuthed(false); setRoute("/login"); }}/>
      <div className="app-layout">
        <window.LeftRail route={route} onNav={navigate} isStaff={user.roles.includes("staff")} assetCount={assets.length}/>
        <main className="app-main">{main}</main>
      </div>
      <window.CommandPalette open={cmdK} onClose={() => setCmdK(false)} onNav={setRoute} onOpenAsset={openAsset} assets={assets}/>
      <window.TweaksPanel open={tweaksOpen} onClose={() => setTweaksOpen(false)} tweaks={T} setTweaks={setTweaks}/>
    </window.ToastProvider>
  );
}

// Wait for all babel scripts to load before mounting
const tryMount = () => {
  if (window.Library && window.AssetDetail && window.UploadScreen && window.ChatScreen && window.LoginScreen && window.TopBar) {
    if (window.__remapThumbs) window.__remapThumbs();
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  } else {
    setTimeout(tryMount, 60);
  }
};
tryMount();

// Tweaks host integration
window.addEventListener("message", (e) => {
  if (e.data?.type === "__activate_edit_mode") window.dispatchEvent(new CustomEvent("tweaks-open"));
  if (e.data?.type === "__deactivate_edit_mode") window.dispatchEvent(new CustomEvent("tweaks-close"));
});
window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
</script>
